<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinWordle — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --gold:#C9A84C;--gold-light:#F0D98B;--navy:#0B1629;--navy-mid:#162240;
    --slate:#2D4A6B;--green:#2A7A4B;--green-light:#3DAB68;
    --yellow-light:#EDBA2A;--gray-dark:#4A5568;--gray-mid:#718096;
    --white:#F7F5F0;--off-white:#EDE9E0;--red:#E05252;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Manrope',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0;}

  /* LOGIN */
  #login-screen{display:flex;justify-content:center;align-items:center;min-height:100vh;width:100%;background:radial-gradient(ellipse at 30% 30%,#1a2d4d,var(--navy));}
  .login-card{background:rgba(22,34,64,.9);border:1px solid rgba(201,168,76,.25);border-radius:18px;padding:2.5rem 2rem;width:100%;max-width:380px;text-align:center;}
  .login-icon{font-size:2.5rem;margin-bottom:.75rem;}
  .login-title{font-family:'DM Serif Display',serif;font-size:1.8rem;color:var(--gold-light);margin-bottom:.3rem;}
  .login-sub{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gray-mid);margin-bottom:1.75rem;}
  .pw-input{width:100%;background:rgba(11,22,41,.7);border:1px solid rgba(201,168,76,.2);border-radius:9px;padding:11px 14px;color:var(--white);font-family:'Manrope',sans-serif;font-size:15px;outline:none;transition:border-color .2s;margin-bottom:.75rem;text-align:center;letter-spacing:4px;}
  .pw-input:focus{border-color:rgba(201,168,76,.5);}
  .pw-input::placeholder{letter-spacing:0;color:rgba(255,255,255,.22);}
  .btn-login{width:100%;padding:13px;background:var(--gold);color:var(--navy);font-family:'Manrope',sans-serif;font-size:15px;font-weight:700;border:none;border-radius:10px;cursor:pointer;transition:.2s;}
  .btn-login:hover{background:var(--gold-light);}
  .login-error{font-size:13px;color:var(--red);margin-top:.5rem;min-height:18px;}

  /* ADMIN */
  #admin-screen{display:none;flex-direction:column;width:100%;min-height:100vh;padding:1.5rem;align-items:center;}
  #admin-screen.visible{display:flex;}
  .admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;max-width:900px;width:100%;}
  .admin-title{font-family:'DM Serif Display',serif;font-size:1.8rem;color:var(--gold-light);}
  .admin-sub{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gray-mid);}
  .badge{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:5px 12px;border-radius:20px;border:1px solid rgba(201,168,76,.3);background:rgba(201,168,76,.1);color:var(--gold);}
  .badge.green{border-color:rgba(42,122,75,.4);background:rgba(42,122,75,.1);color:var(--green-light);}
  .badge.red{border-color:rgba(224,82,82,.3);background:rgba(224,82,82,.08);color:var(--red);}
  .admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;max-width:900px;width:100%;}
  @media(max-width:640px){.admin-grid{grid-template-columns:1fr;}}
  .card{background:rgba(22,34,64,.75);border:1px solid rgba(201,168,76,.15);border-radius:14px;padding:1.5rem;}
  .card-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;}
  .status-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px;}
  .status-row:last-child{border-bottom:none;}
  .status-label{color:var(--gray-mid);}
  .status-val{font-weight:700;color:var(--white);}
  .status-val.gold{color:var(--gold-light);}
  .btn{padding:11px 18px;border:none;border-radius:9px;cursor:pointer;font-family:'Manrope',sans-serif;font-size:14px;font-weight:700;transition:.2s;display:flex;align-items:center;justify-content:center;gap:6px;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn-gold{background:var(--gold);color:var(--navy);}
  .btn-gold:hover:not(:disabled){background:var(--gold-light);}
  .btn-green{background:var(--green);color:var(--white);}
  .btn-green:hover:not(:disabled){background:var(--green-light);}
  .btn-ghost{background:transparent;color:var(--gold);border:1px solid rgba(201,168,76,.3);}
  .btn-ghost:hover:not(:disabled){background:rgba(201,168,76,.08);}
  .btn-red{background:rgba(224,82,82,.15);color:var(--red);border:1px solid rgba(224,82,82,.3);}
  .btn-red:hover:not(:disabled){background:rgba(224,82,82,.25);}
  .btn-row{display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap;}
  .team-list{display:flex;flex-direction:column;gap:5px;}
  .team-row{display:flex;align-items:center;gap:8px;padding:7px 10px;background:rgba(11,22,41,.4);border-radius:8px;font-size:13px;}
  .team-dot{width:8px;height:8px;border-radius:50%;background:var(--gray-dark);flex-shrink:0;}
  .team-dot.ready{background:var(--green-light);}
  .team-dot.done{background:var(--gold);}
  .team-name-cell{flex:1;font-weight:600;}
  .team-score-cell{font-family:'DM Mono',monospace;font-size:12px;color:var(--gold-light);}
  .team-status-cell{font-family:'DM Mono',monospace;font-size:10px;color:var(--gray-mid);}
  .progress-bar-wrap{height:6px;background:rgba(255,255,255,.08);border-radius:3px;margin:1rem 0;overflow:hidden;}
  .progress-bar-fill{height:100%;background:var(--gold);border-radius:3px;transition:width .4s;}
  .word-card{background:rgba(11,22,41,.6);border-radius:10px;padding:1rem;margin-top:.75rem;}
  .word-display{font-family:'DM Serif Display',serif;font-size:2rem;color:var(--gold-light);letter-spacing:6px;text-transform:uppercase;margin-bottom:.4rem;}
  .word-clue{font-size:13px;color:var(--gray-mid);font-style:italic;line-height:1.5;}
  .round-nav{display:flex;gap:5px;margin-bottom:1rem;flex-wrap:wrap;}
  .round-dot{width:32px;height:32px;border-radius:6px;background:rgba(11,22,41,.5);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--gray-mid);font-weight:600;}
  .round-dot.current{border-color:rgba(201,168,76,.5);background:rgba(201,168,76,.1);color:var(--gold);}
  .round-dot.done{border-color:rgba(42,122,75,.3);background:rgba(42,122,75,.08);color:var(--green-light);}
  .log{background:rgba(11,22,41,.5);border-radius:8px;padding:.75rem;font-family:'DM Mono',monospace;font-size:11px;color:var(--gray-mid);max-height:120px;overflow-y:auto;line-height:1.8;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-icon">🔐</div>
    <div class="login-title">Admin Panel</div>
    <div class="login-sub">FinWordle Host Control</div>
    <input type="password" class="pw-input" id="pw-input" placeholder="Enter password"
      onkeydown="if(event.key==='Enter') doLogin()">
    <button class="btn-login" onclick="doLogin()">Access Dashboard →</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="admin-screen">
  <div class="admin-header">
    <div>
      <div class="admin-title">FinWordle Admin</div>
      <div class="admin-sub">Host Control Panel</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <div class="badge" id="state-badge">No Session</div>
      <button class="btn btn-ghost" style="padding:8px 14px;font-size:13px;" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="admin-grid">
    <!-- LEFT COLUMN -->
    <div style="display:flex;flex-direction:column;gap:1.5rem;">

      <!-- Session Status -->
      <div class="card">
        <div class="card-title">Session Status</div>
        <div class="status-row"><span class="status-label">Round</span><span class="status-val gold" id="st-round">—</span></div>
        <div class="status-row"><span class="status-label">Round State</span><span class="status-val" id="st-state">—</span></div>
        <div class="status-row"><span class="status-label">Teams Ready</span><span class="status-val" id="st-ready">0 / 11</span></div>
        <div class="status-row"><span class="status-label">Teams Done</span><span class="status-val" id="st-done">0 / 11</span></div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="st-progress" style="width:0%"></div></div>
      </div>

      <!-- Current Word -->
      <div class="card">
        <div class="card-title">Current Round Word</div>
        <div class="round-nav" id="round-nav"></div>
        <div class="word-card">
          <div class="word-display" id="word-display">—</div>
          <div class="word-clue" id="word-clue">No active round</div>
        </div>
      </div>

      <!-- Controls -->
      <div class="card">
        <div class="card-title">Game Controls</div>
        <div class="btn-row">
          <button class="btn btn-gold" id="btn-start-round" onclick="startRound()" disabled>▶ Start Round</button>
          <button class="btn btn-ghost" id="btn-show-results" onclick="showResults()" disabled>📊 Show Results</button>
        </div>
        <div class="btn-row">
          <button class="btn btn-ghost" id="btn-show-lb" onclick="showLeaderboard()" disabled>🏆 Leaderboard</button>
          <button class="btn btn-ghost" id="btn-end-game" onclick="endGame()" disabled>🏁 End Game</button>
        </div>
        <div class="btn-row">
          <button class="btn btn-red" onclick="resetSession()">↺ Reset Session</button>
        </div>
        <div id="control-msg" style="font-size:12px;color:var(--green-light);margin-top:.5rem;min-height:16px;"></div>
      </div>

    </div>

    <!-- RIGHT COLUMN -->
    <div style="display:flex;flex-direction:column;gap:1.5rem;">

      <!-- Team Progress -->
      <div class="card">
        <div class="card-title">Team Progress</div>
        <div class="team-list" id="team-list"></div>
      </div>

      <!-- Activity Log -->
      <div class="card">
        <div class="card-title">Activity Log</div>
        <div class="log" id="activity-log">Waiting for session data…</div>
      </div>

    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, onValue, update, remove }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBP8F2OTa-lvvs16yZ9zdGHkz795TeJpQE",
    authDomain: "finwordlemna.firebaseapp.com",
    databaseURL: "https://finwordlemna-default-rtdb.firebaseio.com",
    projectId: "finwordlemna",
    storageBucket: "finwordlemna.firebasestorage.app",
    messagingSenderId: "793224287034",
    appId: "1:793224287034:web:9aa1ce14c639210d863603",
    measurementId: "G-1WG5DVQG54"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Expose to global scope for non-module scripts
  window._db      = db;
  window._ref     = ref;
  window._set     = set;
  window._get     = get;
  window._onValue = onValue;
  window._update  = update;
  window._remove  = remove;
  window._firebaseReady = true;
  document.dispatchEvent(new Event('firebaseReady'));
</script>

<script>
// ═══════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════
const ADMIN_PASSWORD = "finwordle2025";
const GAME_SESSION_ID = 'session1';
const NUM_ROUNDS = 5;
const NUM_TEAMS  = 11;

const WORD_BANK = [
  { word:"YIELD", clue:"The income return on an investment, often expressed as a percentage.",           def:"Income return on an investment as a percentage of its cost or market value." },
  { word:"HEDGE", clue:"A risk-management strategy using offsetting positions to limit potential losses.", def:"An investment made to reduce the risk of adverse price movements in an asset." },
  { word:"SHORT", clue:"Selling a borrowed security in the expectation of buying it back at a lower price.", def:"A position taken by selling borrowed securities, profiting if the price falls." },
  { word:"DEBIT", clue:"An accounting entry that increases assets or decreases liabilities on the balance sheet.", def:"An accounting entry recording an increase in assets or a reduction in liabilities." },
  { word:"FLOOR", clue:"The minimum interest rate specified in a financial contract, protecting against rate falls.", def:"A contractual lower bound on interest rates, protecting against further declines." },
];

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let isLoggedIn  = false;
let sessionData = null;
let logLines    = [];
let fbListener  = null;   // keep track of listener so we don't double-attach

// Firebase helpers (populated once module fires)
let db, fbRef, fbSet, fbGet, fbOnValue, fbUpdate, fbRemove;

// ═══════════════════════════════════════════
//  FIREBASE READY
// ═══════════════════════════════════════════
document.addEventListener('firebaseReady', () => {
  db        = window._db;
  fbRef     = window._ref;
  fbSet     = window._set;
  fbGet     = window._get;
  fbOnValue = window._onValue;
  fbUpdate  = window._update;
  fbRemove  = window._remove;

  // If user already logged in before Firebase finished loading, start now
  if (isLoggedIn) attachListener();
});

// ═══════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════
function doLogin() {
  const pw = document.getElementById('pw-input').value;
  const errEl = document.getElementById('login-error');

  if (pw === ADMIN_PASSWORD) {
    isLoggedIn = true;
    errEl.textContent = '';
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').classList.add('visible');

    // Firebase may already be ready
    if (window._firebaseReady) attachListener();
    // Otherwise, the firebaseReady event handler above will call attachListener()
  } else {
    errEl.textContent = 'Incorrect password.';
    document.getElementById('pw-input').value = '';
  }
}

function doLogout() {
  isLoggedIn = false;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-screen').classList.remove('visible');
  document.getElementById('pw-input').value = '';
  document.getElementById('login-error').textContent = '';
  // Firebase realtime listener stays attached (harmless while logged out, reconnects on next login)
}

// Make login function callable from inline onclick
window.doLogin  = doLogin;
window.doLogout = doLogout;

// ═══════════════════════════════════════════
//  FIREBASE LISTENER
// ═══════════════════════════════════════════
function attachListener() {
  if (!db || fbListener) return;   // already attached or DB not ready
  fbListener = fbOnValue(fbRef(db, `sessions/${GAME_SESSION_ID}`), (snap) => {
    if (!snap.exists()) {
      renderNoSession();
    } else {
      sessionData = snap.val();
      renderDashboard(sessionData);
    }
  });
}

// ═══════════════════════════════════════════
//  RENDER — NO SESSION
// ═══════════════════════════════════════════
function renderNoSession() {
  sessionData = null;
  document.getElementById('state-badge').textContent  = 'No Session';
  document.getElementById('state-badge').className    = 'badge red';
  document.getElementById('st-round').textContent     = '—';
  document.getElementById('st-state').textContent     = 'No session found';
  document.getElementById('st-ready').textContent     = `0 / ${NUM_TEAMS}`;
  document.getElementById('st-done').textContent      = `0 / ${NUM_TEAMS}`;
  document.getElementById('st-progress').style.width  = '0%';
  document.getElementById('word-display').textContent = '—';
  document.getElementById('word-clue').textContent    = 'No active round';
  document.getElementById('team-list').innerHTML =
    '<div style="font-size:13px;color:var(--gray-mid);">No session active. Players need to set up a game first.</div>';
  setButtonStates('none');
}

// ═══════════════════════════════════════════
//  RENDER — DASHBOARD
// ═══════════════════════════════════════════
function renderDashboard(data) {
  const round  = data.currentRound ?? 0;
  const state  = data.roundState   ?? 'waiting';
  const teams  = data.teams        || [];
  const ready  = data.teamReady    ? Object.keys(data.teamReady).length : 0;
  const subs   = data.roundSubmissions || {};
  const done   = Object.values(subs).filter(s => s && s.done).length;

  // ── State badge ──
  const stateLabels = {
    waiting:     'Waiting',
    active:      'Round Active',
    results:     'Showing Results',
    leaderboard: 'Leaderboard',
    final:       'Game Over'
  };
  const stateCls = {
    waiting:     'badge',
    active:      'badge green',
    results:     'badge',
    leaderboard: 'badge',
    final:       'badge gold'
  };
  document.getElementById('state-badge').textContent = stateLabels[state] || state;
  document.getElementById('state-badge').className   = stateCls[state]    || 'badge';

  // ── Status rows ──
  document.getElementById('st-round').textContent    = `Round ${round + 1} of ${NUM_ROUNDS}`;
  document.getElementById('st-state').textContent    = stateLabels[state] || state;
  document.getElementById('st-ready').textContent    = `${ready} / ${NUM_TEAMS}`;
  document.getElementById('st-done').textContent     = `${done}  / ${NUM_TEAMS}`;
  document.getElementById('st-progress').style.width = `${(done / NUM_TEAMS) * 100}%`;

  // ── Round nav dots ──
  document.getElementById('round-nav').innerHTML = Array.from({ length: NUM_ROUNDS }, (_, i) => {
    let cls = 'round-dot';
    if (i < round)  cls += ' done';
    if (i === round) cls += ' current';
    return `<div class="${cls}">R${i + 1}</div>`;
  }).join('');

  // ── Current word ──
  const wordObj = WORD_BANK[round] || { word: '—', clue: 'No active round' };
  document.getElementById('word-display').textContent = wordObj.word;
  document.getElementById('word-clue').textContent    = wordObj.clue;

  // ── Team list ──
  const tl = document.getElementById('team-list');
  tl.innerHTML = '';

  if (!teams.length) {
    tl.innerHTML = '<div style="font-size:13px;color:var(--gray-mid);">No teams registered yet.</div>';
  } else {
    teams.forEach((name, idx) => {
      const isReady  = data.teamReady?.[idx];
      const sub      = subs[idx];
      const scores   = data.scores?.[idx] || [];
      const total    = scores.reduce((a, b) => (b !== undefined && b !== null ? a + b : a), 0);
      const dotCls   = 'team-dot' + (sub?.done ? ' done' : isReady ? ' ready' : '');
      const statusTx = sub?.done ? `${sub.score ?? 0} pts` : isReady ? 'Ready' : 'Not joined';

      const div = document.createElement('div');
      div.className = 'team-row';
      div.innerHTML = `
        <div class="${dotCls}"></div>
        <div class="team-name-cell">${name}</div>
        <div class="team-status-cell">${statusTx}</div>
        <div class="team-score-cell">Total: ${total}</div>`;
      tl.appendChild(div);
    });
  }

  // ── Button states ──
  if      (state === 'waiting')     setButtonStates('pre-round');
  else if (state === 'active')      setButtonStates('in-round');
  else if (state === 'results')     setButtonStates('post-results');
  else if (state === 'leaderboard') setButtonStates('post-lb');
  else if (state === 'final')       setButtonStates('final');
  else                              setButtonStates('none');
}

// ═══════════════════════════════════════════
//  BUTTON STATES
// ═══════════════════════════════════════════
function setButtonStates(state) {
  const bStart   = document.getElementById('btn-start-round');
  const bResults = document.getElementById('btn-show-results');
  const bLb      = document.getElementById('btn-show-lb');
  const bEnd     = document.getElementById('btn-end-game');

  // Disable all first
  [bStart, bResults, bLb, bEnd].forEach(b => b.disabled = true);

  if (state === 'pre-round')    { bStart.disabled   = false; }
  if (state === 'in-round')     { bResults.disabled = false; }
  if (state === 'post-results') { bLb.disabled      = false; }
  if (state === 'post-lb') {
    const round = sessionData?.currentRound ?? 0;
    if (round < NUM_ROUNDS - 1) bStart.disabled = false;
    bEnd.disabled = false;
  }
  // 'final' and 'none' → all disabled (already done above)
}

// ═══════════════════════════════════════════
//  GAME CONTROLS
// ═══════════════════════════════════════════

// Start Round — handles both the very first round AND advancing after leaderboard
async function startRound() {
  if (!db || !sessionData) return;

  const currentState = sessionData.roundState ?? 'waiting';
  const currentRound = sessionData.currentRound ?? -1;

  // Advance only when coming from leaderboard; first start keeps round 0
  const nextRound = (currentState === 'leaderboard') ? currentRound + 1 : 0;

  if (nextRound >= WORD_BANK.length) {
    alert('All rounds have been completed! Use End Game instead.');
    return;
  }

  addLog(`▶ Starting Round ${nextRound + 1}`);

  await fbUpdate(fbRef(db, `sessions/${GAME_SESSION_ID}`), {
    roundState:        'active',
    currentRound:      nextRound,
    roundSubmissions:  {},   // clear previous round submissions
    teamReady:         {},   // reset ready flags
  });

  showControlMsg(`Round ${nextRound + 1} started!`);
}

async function showResults() {
  if (!db) return;
  addLog('📊 Showing round results');
  await fbUpdate(fbRef(db, `sessions/${GAME_SESSION_ID}`), { roundState: 'results' });
  showControlMsg('Results shown to all teams.');
}

async function showLeaderboard() {
  if (!db) return;
  addLog('🏆 Showing leaderboard');
  await fbUpdate(fbRef(db, `sessions/${GAME_SESSION_ID}`), { roundState: 'leaderboard' });
  showControlMsg('Leaderboard shown to all teams.');
}

async function endGame() {
  if (!db) return;
  if (!confirm('End the game and show final results to all teams?')) return;
  addLog('🏁 Game ended — final results');
  await fbUpdate(fbRef(db, `sessions/${GAME_SESSION_ID}`), { roundState: 'final' });
  showControlMsg('Final results shown to all teams!');
}

async function resetSession() {
  if (!db) return;
  if (!confirm('Reset and clear ALL session data? This cannot be undone.')) return;
  addLog('↺ Session reset');
  await fbRemove(fbRef(db, `sessions/${GAME_SESSION_ID}`));
  logLines = [];
  showControlMsg('Session cleared. Players will be redirected to setup.');
}

// Expose controls to inline onclick handlers
window.startRound     = startRound;
window.showResults    = showResults;
window.showLeaderboard = showLeaderboard;
window.endGame        = endGame;
window.resetSession   = resetSession;

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
function showControlMsg(msg) {
  const el = document.getElementById('control-msg');
  el.textContent = msg;
  setTimeout(() => { el.textContent = ''; }, 3000);
}

function addLog(msg) {
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const ts  = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  logLines.unshift(`[${ts}] ${msg}`);
  if (logLines.length > 20) logLines.pop();
  document.getElementById('activity-log').textContent = logLines.join('\n');
}
</script>
